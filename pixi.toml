[workspace]
name = "my-claude-setup"
version = "0.1.0"
description = "Versioned Claude Code global configuration"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
git-cliff = ">=2"
pre-commit = ">=4"

[tasks]
bootstrap   = { cmd = "pre-commit install --hook-type commit-msg && pre-commit install", description = "Install pre-commit hooks" }
sync-in     = { cmd = "bash scripts/sync_in.sh", description = "Pull config from ~/.claude into claude/" }
sync-out    = { cmd = "bash scripts/sync_out.sh", description = "Apply claude/ to ~/.claude with backup" }
diff        = { cmd = "bash scripts/diff.sh", description = "Preview diff between repo and ~/.claude" }
changelog   = { cmd = "git-cliff -o CHANGELOG.md", description = "Regenerate CHANGELOG.md" }
ci          = { cmd = "pre-commit run --all-files", description = "Validate all tracked files" }
